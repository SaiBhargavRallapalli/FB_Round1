<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#172B36"/>
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#114C5A" stroke-width="0.8" opacity="0.5"/>
    </pattern>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC801"/>
      <stop offset="100%" style="stop-color:#FF9932"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#114C5A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#172B36;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="280" rx="500" ry="300" fill="url(#glow)"/>
  <!-- Logo mark -->
  <rect x="80" y="64" width="52" height="52" rx="12" fill="url(#titleGrad)" opacity="0.9"/>
  <text x="106" y="97" font-family="monospace" font-size="20" font-weight="800" fill="#172B36" text-anchor="middle">N</text>
  <!-- Brand name -->
  <text x="148" y="97" font-family="monospace,system-ui" font-size="24" font-weight="700" fill="#F1F6F4">Nexus</text>
  <text x="232" y="97" font-family="monospace,system-ui" font-size="24" font-weight="700" fill="#FFC801">AI</text>
  <!-- Main headline -->
  <text x="80" y="290" font-family="monospace,system-ui" font-size="72" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2">Automate</text>
  <text x="80" y="375" font-family="monospace,system-ui" font-size="72" font-weight="800" fill="#F1F6F4" letter-spacing="-2">Intelligence.</text>
  <!-- Subtext -->
  <text x="80" y="450" font-family="system-ui,sans-serif" font-size="28" fill="#D9E8E2" opacity="0.8">AI-Driven Data Automation Platform</text>
  <!-- Stats strip -->
  <rect x="80" y="510" width="180" height="60" rx="8" fill="#114C5A" opacity="0.7"/>
  <text x="170" y="534" font-family="monospace" font-size="20" font-weight="700" fill="#FFC801" text-anchor="middle">10M+</text>
  <text x="170" y="556" font-family="system-ui" font-size="11" fill="#D9E8E2" text-anchor="middle">API CALLS DAILY</text>
  <rect x="276" y="510" width="180" height="60" rx="8" fill="#114C5A" opacity="0.7"/>
  <text x="366" y="534" font-family="monospace" font-size="20" font-weight="700" fill="#FFC801" text-anchor="middle">99.99%</text>
  <text x="366" y="556" font-family="system-ui" font-size="11" fill="#D9E8E2" text-anchor="middle">UPTIME SLA</text>
  <rect x="472" y="510" width="180" height="60" rx="8" fill="#114C5A" opacity="0.7"/>
  <text x="562" y="534" font-family="monospace" font-size="20" font-weight="700" fill="#FFC801" text-anchor="middle">500+</text>
  <text x="562" y="556" font-family="system-ui" font-size="11" fill="#D9E8E2" text-anchor="middle">ENTERPRISE CLIENTS</text>
</svg>
